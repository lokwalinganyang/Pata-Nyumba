{% extends 'base.html' %}
{% block title %}Delete Property - ManyumbaVacant{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card"><div class="card-header bg-danger text-white"><h4>Delete Property</h4></div><div class="card-body text-center"><i class="bi bi-exclamation-triangle" style="font-size:4rem;color:#dc3545"></i><h5 class="mt-3">Delete "{{ property.title }}"?</h5><p>This action cannot be undone.</p><form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger">Yes, Delete</button> <a href="{% url 'manyumbavacant:landlord_dashboard' %}" class="btn btn-secondary">Cancel</a></form></div></div></div></div>
{% endblock %}
